name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-check:
    name: Run/Import sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .
      - name: App import sanity check
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          root = Path(".").resolve()
          src = root / "src"
          if src.exists():
              sys.path.insert(0, str(src))
          import metrics.fmd
          import embeddings.extractor
          import utils.config
          print("Import sanity check passed")
          PY
      - name: CLI sanity check
        run: |
          python scripts/run_experiment.py --help

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: run-check
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
          pip install -e .
      - name: Run tests
        run: pytest -q tests

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [run-check, tests]
    steps:
      - run: echo "Basic CI checks passed."
