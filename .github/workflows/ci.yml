name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  HF_HUB_DOWNLOAD_TIMEOUT: "30"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-check:
    name: Run/Import sanity check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee /tmp/pip.log
          pip install -r requirements-ci.txt 2>&1 | tee -a /tmp/pip.log
          pip install -e . 2>&1 | tee -a /tmp/pip.log
      - name: Report install failure on the commit
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('/tmp/pip.log', 'utf8'); } catch (e) { log = 'no pip.log: ' + e; }
            const tail = log.split('\n').slice(-100).join('\n').slice(-6500);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: 'CI dependency-install failure (tail of pip log):\n```\n' + tail + '\n```',
            });
      - name: App import sanity check
        env:
          PYTHONPATH: src
        run: python -c "from metrics.fmd import FrechetMusicDistance; from embeddings.extractor import EmbeddingExtractor; from utils.config import load_config; print('Import sanity check passed')"
      - name: CLI sanity check
        run: python main.py --help

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: run-check
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e .
      - name: Run tests
        run: |
          set -o pipefail
          pytest -q tests -x -k "not integration" --no-header -p no:cacheprovider \
            --override-ini="addopts=" --timeout=300 --timeout-method=thread \
            2>&1 | tee /tmp/pytest.log
      - name: Report test failure on the commit
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('/tmp/pytest.log', 'utf8'); } catch (e) { log = 'no pytest.log: ' + e; }
            const tail = log.split('\n').slice(-100).join('\n').slice(-6500);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: 'CI test failure (tail of pytest log):\n```\n' + tail + '\n```',
            });

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [run-check, tests]
    steps:
      - run: echo "Basic CI checks passed."
