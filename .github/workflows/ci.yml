name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-check:
    name: Run/Import sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e .
      - name: App import sanity check
        run: python -c "from src.metrics.fmd import FrechetMusicDistance; from src.embeddings.extractor import EmbeddingExtractor; from src.utils.config import load_config; print('Import sanity check passed')"
      - name: CLI sanity check
        run: python scripts/run_experiment.py --help
        continue-on-error: true

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: run-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e .
      - name: Run tests
        run: pytest -q tests -x -k "not integration" --no-header -p no:cacheprovider --override-ini="addopts="

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [run-check, tests]
    steps:
      - run: echo "Basic CI checks passed."
