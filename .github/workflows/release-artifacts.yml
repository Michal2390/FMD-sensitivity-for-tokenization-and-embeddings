name: Release Artifacts

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  upload-results:
    name: Upload results artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload reports and plots
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.ref_name }}
          path: |
            results/reports/**
            results/plots/**
            results/**/*.csv
            results/**/*.json
            results/**/*.md
          if-no-files-found: warn
          retention-days: 30
