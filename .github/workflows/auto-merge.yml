name: Auto-merge

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Enable auto-merge for Copilot PRs
        uses: actions/github-script@v7
        with:
          script: |
            // Find open PRs for the current branch
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.pull_request?.head?.ref || context.payload.check_suite?.head_branch}`,
            });

            for (const pull of pulls) {
              console.log(`Enabling auto-merge for PR #${pull.number}`);

              // Try to enable auto-merge via GraphQL
              try {
                await github.graphql(`
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: SQUASH
                    }) {
                      pullRequest {
                        autoMergeRequest {
                          enabledAt
                        }
                      }
                    }
                  }
                `, { pullRequestId: pull.node_id });
                console.log(`Auto-merge enabled for PR #${pull.number}`);
              } catch (e) {
                console.log(`Could not enable auto-merge (may need branch protection rules): ${e.message}`);
                console.log('Attempting direct merge as fallback...');

                // Fallback: check if all CI checks passed and merge directly
                const { data: checks } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: pull.head.sha,
                });

                const allPassed = checks.check_runs.length > 0 &&
                  checks.check_runs
                    .filter(cr => cr.name !== 'Auto-merge PR')
                    .every(cr => cr.conclusion === 'success');

                if (allPassed) {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pull.number,
                    merge_method: 'squash',
                  });
                  console.log(`PR #${pull.number} merged successfully!`);
                } else {
                  console.log('Not all checks passed yet, skipping merge');
                }
              }
            }
