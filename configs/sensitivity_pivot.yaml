# Sensitivity Pivot Configuration (corrected, June 2026)
#
# 3 configurations — honest naming:
#   A: CLaMP-2 + MTF  (native MIDI Text Format from raw MIDI)
#   B: CLaMP-2 + REMI (MidiTok REMI tokens → text patches; isolates tokenization)
#   C: CLaMP-1 + ABC  (music21 ABC bar-patching; isolates model)

configurations:
  - name: "CLaMP2-MTF"
    model: "CLaMP-2"
    input_format: "MTF"
    description: "CLaMP-2 native MTF from MIDI (lossless, preserves velocity)"
  - name: "CLaMP2-REMI"
    model: "CLaMP-2"
    input_format: "REMI"
    tokenizer: "REMI"
    description: "CLaMP-2 with MidiTok REMI token text (lossy tokenization)"
  - name: "CLaMP1-ABC"
    model: "CLaMP-1"
    input_format: "ABC"
    description: "CLaMP-1 with ABC notation via music21 (no velocity in ABC)"

# 4 datasets → 6 pairs for valid Spearman ranking
datasets:
  - name: "maestro"
    description: "Classical piano, virtuosic (MAESTRO v3)"
  - name: "pop909"
    description: "Pop songs (POP909)"
  - name: "folk"
    description: "Folk tunes (Nottingham)"
  - name: "midicaps_classical"
    description: "Classical subset from MidiCaps (168k Lakh-derived corpus)"

perturbations:
  - name: "original"
    description: "No perturbation (baseline)"
    remove_velocity: false
    quantize_time: false
    constant_tempo: false
  - name: "no_velocity"
    description: "Velocity → constant 64 (remove dynamics)"
    remove_velocity: true
    quantize_time: false
    constant_tempo: false
  - name: "quantized_time"
    description: "Quantize to 16th notes (remove microtiming)"
    remove_velocity: false
    quantize_time: true
    constant_tempo: false
  - name: "constant_tempo"
    description: "Tempo → constant 120 BPM (remove rubato/tempo changes)"
    remove_velocity: false
    quantize_time: false
    constant_tempo: true
  - name: "all_combined"
    description: "All perturbations combined (total de-expression)"
    remove_velocity: true
    quantize_time: true
    constant_tempo: true

self_similarity:
  n_splits: 2
  seed: 42

bootstrap:
  n_resamples: 50
  sample_size: 100
  seed: 42
  dataset_pair: ["maestro", "pop909"]

min_pairs_for_spearman: 6

seed: 42
max_files_per_dataset: 80
output_dir: "results/reports/sensitivity_pivot"
plots_dir: "results/plots/sensitivity_pivot"
