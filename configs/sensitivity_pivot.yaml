# Sensitivity Pivot Configuration (corrected, June 2026)
#
# Paper-grade configurations with honest input semantics:
#   A: MusicBERT + REMI (MidiTok tokenization sensitivity baseline)
#   B: MusicBERT + TSD  (same model, different MidiTok tokenizer)
#   C: CLaMP-2 + MTF   (native MIDI Text Format from raw MIDI)
#   D: CLaMP-1 + ABC   (music21 ABC bar-patching; no velocity channel)

configurations:
  - name: "MusicBERT-REMI"
    model: "MusicBERT"
    input_format: "MIDITOK"
    tokenizer: "REMI"
    description: "MusicBERT over MidiTok REMI tokens"
  - name: "MusicBERT-TSD"
    model: "MusicBERT"
    input_format: "MIDITOK"
    tokenizer: "TSD"
    description: "MusicBERT over MidiTok TSD tokens"
  - name: "CLaMP2-MTF"
    model: "CLaMP-2"
    input_format: "MTF"
    description: "CLaMP-2 native MTF from MIDI (lossless, preserves velocity)"
  - name: "CLaMP1-ABC"
    model: "CLaMP-1"
    input_format: "ABC"
    description: "CLaMP-1 with ABC notation via music21 (no velocity in ABC)"
  # Control configuration (keep LAST so the RNG stream of the four primary
  # configs is unchanged): same model as CLaMP2-MTF, same representation as
  # CLaMP1-ABC. Disentangles the model effect from the representation effect.
  - name: "CLaMP2-ABC"
    model: "CLaMP-2"
    input_format: "ABC"
    description: "CLaMP-2 with ABC notation (same-model representation control)"

# 6 datasets → C(6,2) = 15 pairs.
# Spearman rank-agreement between configurations is only flagged
# `interpretable` (and a p-value reported) at n_pairs >= 10, so 15 pairs
# puts the cross-configuration ranking on statistically defensible ground
# (directly addresses the "statistics on too few values" critique).
datasets:
  - name: "maestro"
    description: "Classical piano, virtuosic performance (MAESTRO v3)"
  - name: "pop909"
    description: "Pop songs, clean arrangements (POP909)"
  - name: "classical"
    description: "Classical (Lakh-derived genre subset)"
  - name: "jazz"
    description: "Jazz (Lakh-derived genre subset)"
  - name: "rock"
    description: "Rock (Lakh-derived genre subset)"
  - name: "rap"
    description: "Rap/Hip-hop (Lakh-derived genre subset)"

perturbations:
  - name: "original"
    description: "No perturbation (baseline)"
    remove_velocity: false
    quantize_time: false
    constant_tempo: false
  - name: "no_velocity"
    description: "Velocity → constant 64 (remove dynamics)"
    remove_velocity: true
    quantize_time: false
    constant_tempo: false
  - name: "quantized_time"
    description: "Quantize to 16th notes (remove microtiming)"
    remove_velocity: false
    quantize_time: true
    constant_tempo: false
  - name: "constant_tempo"
    description: "Tempo → constant 120 BPM (remove rubato/tempo changes)"
    remove_velocity: false
    quantize_time: false
    constant_tempo: true
  - name: "all_combined"
    description: "All perturbations combined (total de-expression)"
    remove_velocity: true
    quantize_time: true
    constant_tempo: true

self_similarity:
  n_splits: 2
  seed: 42

bootstrap:
  n_resamples: 50
  sample_size: 100
  seed: 42
  dataset_pair: ["maestro", "pop909"]

# Bootstrap significance for the perturbation step: each perturbation FMD is
# resampled and tested against the within-dataset noise-floor distribution
# (split-half FMD of the unperturbed embeddings). Yields a CI, a per-config
# SNR, and a bootstrap p-value instead of a single undefended number.
perturbation_bootstrap:
  n_resamples: 100        # bootstrap resamples for the FMD confidence interval
  n_permutations: 200     # permutations for the two-sample significance test
  seed: 42

min_pairs_for_spearman: 6
strict_paper_mode: true

seed: 42
max_files_per_dataset: 80
output_dir: "results/reports/sensitivity_pivot"
plots_dir: "results/plots/sensitivity_pivot"
